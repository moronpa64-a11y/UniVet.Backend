spring.application.name=portal-uniremington-backend
server.port=8080

# Base de datos — usa variables de entorno o valores por defecto para desarrollo local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/veterinaria_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# JWT — usa variables de entorno o valor por defecto para desarrollo
app.jwt.secret=${JWT_SECRET:uniremington-al-parque-2026-secret-key-super-segura-cambiame-en-produccion}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

logging.level.org.springframework.security=INFO
logging.level.co.edu.uniremington=DEBUG
