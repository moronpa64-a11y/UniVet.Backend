<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Recuperar contraseña</mat-card-title>
      <mat-card-subtitle>Ingresa el correo asociado para recibir el enlace de recuperación.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="ejemplo@correo.com" />
          <mat-error *ngIf="form.controls.email.touched && form.controls.email.invalid">
            {{ form.controls.email.hasError('required') ? 'El correo es obligatorio.' : '' }}
            {{ form.controls.email.hasError('email') ? 'Ingresa un correo válido.' : '' }}
          </mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="full-width" [disabled]="loading">
          {{ loading ? 'Enviando...' : 'Enviar enlace' }}
        </button>
      </form>

      <div class="auth-links">
        <button mat-button color="primary" type="button" (click)="volverLogin()">Volver al login</button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
