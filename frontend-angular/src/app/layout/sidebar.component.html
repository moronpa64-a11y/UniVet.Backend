<aside class="sidebar">
  <!-- Logo / Header -->
  <div class="sidebar-header">
    <div class="logo">
      <mat-icon class="logo-icon">school</mat-icon>
      <div class="logo-text">
        <h2>Uniremington</h2>
        <span>al Parque</span>
      </div>
    </div>
  </div>

  <!-- Info del Usuario logueado -->
  <div class="user-card" *ngIf="isAuthenticated">
    <div class="user-avatar">
      <mat-icon>{{ userRoleIcon }}</mat-icon>
    </div>
    <div class="user-info">
      <strong>{{ currentUser?.fullName || currentUser?.full_name || currentUser?.nombre || currentUser?.email }}</strong>
      <span class="role-badge" [ngClass]="'role-' + (userRole || 'guest').toLowerCase()">
        {{ userRoleLabel }}
      </span>
    </div>
  </div>

  <!-- Menú principal -->
  <nav class="sidebar-menu">
    <ul>
      <li *ngFor="let item of menuItems">
        <a *ngIf="canShowItem(item)"
           [routerLink]="item.route"
           routerLinkActive="active"
           class="menu-item">
          <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
          <span class="menu-label">{{ item.label }}</span>
          <span *ngIf="item.badge" class="menu-badge">{{ item.badge }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Footer del sidebar -->
  <div class="sidebar-footer">
    <button *ngIf="!isAuthenticated" mat-stroked-button class="btn-login" (click)="goToLogin()">
      <mat-icon>login</mat-icon>
      <span>Iniciar Sesión</span>
    </button>
    <button *ngIf="isAuthenticated" mat-stroked-button class="btn-logout" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</aside>
