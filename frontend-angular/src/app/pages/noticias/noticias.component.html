<div class="container-noticias">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Noticias - Uniremington</mat-card-title>
      <button mat-raised-button color="primary" (click)="abrirFormulario()" *ngIf="isAdmin && !mostrarFormulario">
        <mat-icon>add</mat-icon> Publicar Noticia
      </button>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="mostrarFormulario && isAdmin" class="formulario-card">
        <h3>{{ modoEdicion ? 'Editar Noticia' : 'Nueva Noticia' }}</h3>
        <form [formGroup]="form" (ngSubmit)="guardar()">
          <mat-form-field appearance="outline">
            <mat-label>Título</mat-label>
            <input matInput formControlName="titulo" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contenido</mat-label>
            <textarea matInput formControlName="contenido" rows="5"></textarea>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Categoría</mat-label>
            <mat-select formControlName="categoria">
              <mat-option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>URL de Imagen</mat-label>
            <input matInput formControlName="imagenUrl" />
          </mat-form-field>

          <div class="form-actions">
            <button mat-raised-button type="button" (click)="cerrarFormulario()">Cancelar</button>
            <button mat-raised-button color="primary" type="submit" [disabled]="loading">Publicar</button>
          </div>
        </form>
      </div>

      <div *ngIf="!mostrarFormulario" class="noticias-grid">
        <mat-card *ngFor="let noticia of noticias" class="noticia-card">
          <img [src]="noticia.imagenUrl" class="noticia-imagen" />
          <mat-card-content>
            <span class="categoria-badge">{{ noticia.categoria }}</span>
            <h3>{{ noticia.titulo }}</h3>
            <p class="autor">Por {{ noticia.autor }} - {{ noticia.fechaPublicacion | date:'dd/MM/yyyy' }}</p>
            <p>{{ noticia.contenido }}</p>
          </mat-card-content>
          <mat-card-actions *ngIf="isAdmin">
            <button mat-button color="primary" (click)="editarNoticia(noticia)">Editar</button>
            <button mat-button color="warn" (click)="eliminarNoticia(noticia)">Eliminar</button>
          </mat-card-actions>
        </mat-card>
      </div>
    </mat-card-content>
  </mat-card>
</div>
