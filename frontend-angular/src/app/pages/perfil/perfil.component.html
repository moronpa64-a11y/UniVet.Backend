<div class="container-perfil">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Mi Perfil</mat-card-title>
      <button mat-raised-button color="primary" (click)="activarEdicion()" *ngIf="!modoEdicion">
        <mat-icon>edit</mat-icon> Editar
      </button>
    </mat-card-header>

    <mat-card-content>
      <div class="perfil-info">
        <div class="avatar">
          <mat-icon>account_circle</mat-icon>
        </div>

        <div class="rol-badge" [ngClass]="getRoleBadgeClass()">
          {{ getRolLabel() }}
        </div>

        <form [formGroup]="form" class="formulario-perfil">
          <mat-form-field appearance="outline">
            <mat-label>Nombre Completo</mat-label>
            <input matInput formControlName="fullName" />
            <mat-error *ngIf="form.get('fullName')?.hasError('required')">Campo requerido</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" />
          </mat-form-field>

          <div class="form-actions" *ngIf="modoEdicion">
            <button mat-stroked-button type="button" (click)="cancelarEdicion()">
              <mat-icon>close</mat-icon> Cancelar
            </button>
            <button mat-raised-button color="primary" type="button"
              (click)="guardarCambios()" [disabled]="guardando || form.invalid">
              <mat-icon>save</mat-icon>
              {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
            </button>
          </div>
        </form>
      </div>
    </mat-card-content>
  </mat-card>
</div>
